name: Update resume PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'styles.css'
      - 'script.js'
      - 'generate-pdf.js'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate PDF
        run: npm run pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Oleksandr_Bielov_Resume.pdf
          git diff --cached --quiet || git commit -m "chore: update generated resume pdf"
          git push
